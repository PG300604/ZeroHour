# ── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.session.cookie.max-age=2592000

# ── Google OAuth (from Cloud Run env vars) ───────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${FRONTEND_URL:http://localhost:5173}/login/oauth2/code/google

# ── Gemini ────────────────────────────────────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY}

# ── Firebase ─────────────────────────────────────────────────────────────────
firebase.project-id=${FIREBASE_PROJECT_ID}
# Service account JSON passed as base64 env var
firebase.service-account-base64=${FIREBASE_SERVICE_ACCOUNT_BASE64}

# ── AES Encryption ────────────────────────────────────────────────────────────
aes.secret.key=${AES_SECRET_KEY:}

# ── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://zerohour-a84d3.web.app,https://zerohour-a84d3.firebaseapp.com}

# ── Logging (reduce verbosity in prod) ────────────────────────────────────────
logging.level.root=WARN
logging.level.com.zerohour=INFO
logging.level.org.springframework.security=WARN

# ── Session ───────────────────────────────────────────────────────────────────
# Cloud Run is stateless — sessions must work across instances
# Using cookie-based session (default Spring Security)
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

# Request size limits for large PDF and image uploads in production
server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

