server.port=8080
server.servlet.session.cookie.max-age=2592000

# Spring Security OAuth2 Client Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile,https://www.googleapis.com/auth/calendar,https://www.googleapis.com/auth/calendar.events,https://www.googleapis.com/auth/gmail.send
# Force Google to return a refresh token by requesting offline access
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# Custom variables
gemini.api.key=${GEMINI_API_KEY}
firebase.project-id=${FIREBASE_PROJECT_ID}
firebase.service-account-base64=${FIREBASE_SERVICE_ACCOUNT_BASE64}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Logging
logging.level.com.zerohour=DEBUG
logging.level.org.springframework.security=DEBUG

# Allow circular references (needed for AgentOrchestrator <-> SchedulerAgent circular dependency)
spring.main.allow-circular-references=true

# Request size limits for large PDF and image uploads
server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

